<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lineage AI - Orbital Radar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jura:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Jura', sans-serif; background-color: #040f16; color: #00f0ff; overflow: hidden; }
        .radar-circle {
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        .radar-sweep {
            position: absolute; top: 50%; left: 50%; width: 50vw; height: 50vw; transform-origin: 0 0;
            background: conic-gradient(from 0deg, transparent 70%, rgba(0, 240, 255, 0.4) 100%);
            animation: sweep 4s linear infinite;
        }
        @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .glass-dark { background: rgba(0, 20, 30, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(0, 240, 255, 0.3); }
    </style>
</head>
<body class="h-screen w-screen relative">
    
    <!-- Radar Background -->
    <div class="absolute inset-0 flex items-center justify-center opacity-30 pointer-events-none z-0">
        <div class="radar-circle w-[20vw] h-[20vw]"></div>
        <div class="radar-circle w-[40vw] h-[40vw]"></div>
        <div class="radar-circle w-[60vw] h-[60vw]"></div>
        <div class="radar-circle w-[80vw] h-[80vw]"></div>
        <div class="absolute w-full h-[1px] bg-[#00f0ff] opacity-20"></div>
        <div class="absolute h-full w-[1px] bg-[#00f0ff] opacity-20"></div>
        <div class="radar-sweep"></div>
    </div>

    <!-- Center Danger Button -->
    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-50">
        <div class="w-32 h-32 rounded-full border-2 border-red-500 bg-red-950/80 flex items-center justify-center cursor-pointer hover:bg-red-900 transition-colors shadow-[0_0_50px_rgba(255,0,0,0.4)] backdrop-blur-md text-center">
            <span class="text-red-500 font-bold tracking-widest uppercase text-sm">Force<br>Override</span>
        </div>
    </div>

    <!-- Corner Panels -->
    <div class="absolute top-8 left-8 glass-dark p-6 w-80 rounded-tr-3xl rounded-bl-3xl z-10 shadow-[0_0_30px_rgba(0,240,255,0.1)]">
        <h1 class="text-2xl font-bold mb-4 tracking-widest uppercase text-white shadow-[0_0_10px_#00f0ff]">Lineage AI</h1>
        <div class="space-y-4">
            <div>
                <div class="flex justify-between text-xs mb-1"><span>Core Temp</span><span>65°C</span></div>
                <div class="h-1 bg-cyan-900"><div class="h-full bg-cyan-400 shadow-[0_0_8px_#00f0ff]" style="width: 65%"></div></div>
            </div>
            <div>
                <div class="flex justify-between text-xs mb-1"><span>Sync Rate</span><span>98%</span></div>
                <div class="h-1 bg-cyan-900"><div class="h-full bg-cyan-400 shadow-[0_0_8px_#00f0ff]" style="width: 98%"></div></div>
            </div>
        </div>
    </div>

    <div class="absolute bottom-8 right-8 glass-dark p-6 w-[400px] rounded-tl-3xl rounded-br-3xl h-[40vh] flex flex-col z-10 shadow-[0_0_30px_rgba(0,240,255,0.1)]">
        <h2 class="text-sm font-bold mb-4 tracking-widest uppercase text-cyan-500">Live Comms</h2>
        <div class="flex-1 overflow-y-auto text-xs space-y-3">
            <div class="opacity-70">[14:00:22] Node alignment verified.</div>
            <div class="opacity-70">[14:01:45] Telemetry stream stabilized.</div>
            <div class="text-white bg-cyan-900/50 p-2 rounded shadow-[0_0_10px_inset_rgba(0,240,255,0.2)]">[14:05:00] Lyra: Pattern recognition confidence at 99.4%.</div>
            <div class="opacity-70">[14:05:12] Argus: Perimeter scanning in progress...</div>
        </div>
    </div>

</body>
</html>
